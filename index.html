<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO</title>
    <style>
    .intro-name {
      font-size: clamp(60px, 14vw, 140px);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #f0ede6;
      opacity: 0;
      transform: translateY(40px);
      animation: riseIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
      font-family: 'Georgia', serif;
      line-height: 1;
    }
    .intro-line {
      width: 0;
      height: 1px;
      background: #f0ede6;
      margin: 20px auto;
      animation: expandLine 0.6s ease 1.3s forwards;
    }
    .intro-sub {
      font-size: clamp(11px, 2vw, 14px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #888;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.9s forwards;
      font-family: 'Helvetica Neue', sans-serif;
      margin-top: 4px;
    }
    #intro.fade-out {
      animation: overlayFade 0.9s ease 0.2s forwards;
    }
    @keyframes riseIn {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      to { opacity: 1; }
    }
    @keyframes expandLine {
      to { width: 80px; }
    }
    @keyframes overlayFade {
      to { opacity: 0; pointer-events: none; }
    }
  </style>
</head>
<body>
  <div id="intro" style="
    position: fixed; inset: 0; background: #0a0a0a;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; z-index: 9999; pointer-events: none;
  ">
    <div class="intro-name">KIRTI SINGHAL</div>
    <div class="intro-line"></div>
    <div class="intro-sub">Portfolio · 2026</div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
